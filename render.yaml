services:
  # Backend FastAPI Service
  - type: web
    name: data-forge-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      # You can add DATABASE_URL here if using an external DB (like Neon)
      # - key: DATABASE_URL
      #   sync: false

  # Frontend React (Vite) Static Site
  - type: web
    name: data-forge-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishDir: frontend/dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: data-forge-backend
          property: url
